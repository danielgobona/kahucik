services:
  caddy:
    build:
      context: ./infra/caddy
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - api
      - web
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    environment:
      ENVIRONMENT: production
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DATABASE_URL: postgresql+asyncpg://kahucik:${POSTGRES_PASSWORD:-kahucik}@db:5432/kahucik
      REDIS_URL: redis://redis:6379/0
      MEDIA_BACKEND: ${MEDIA_BACKEND:-local}
      MEDIA_LOCAL_PATH: /data/media
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_BUCKET: ${S3_BUCKET:-kahucik}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    volumes:
      - media_data:/data/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./apps/api
    command: ["python", "-m", "kahucik_api.worker"]
    environment:
      ENVIRONMENT: production
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DATABASE_URL: postgresql+asyncpg://kahucik:${POSTGRES_PASSWORD:-kahucik}@db:5432/kahucik
      REDIS_URL: redis://redis:6379/0
      MEDIA_BACKEND: ${MEDIA_BACKEND:-local}
      MEDIA_LOCAL_PATH: /data/media
    volumes:
      - media_data:/data/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    build:
      context: ./apps/api
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://kahucik:${POSTGRES_PASSWORD:-kahucik}@db:5432/kahucik
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kahucik
      POSTGRES_USER: kahucik
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kahucik}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kahucik -d kahucik"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  media_data:
